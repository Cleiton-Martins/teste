<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tela de Teste</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    .mensagem {
      margin-top: 15px;
      color: green;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Teste HTML</h1>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <button onclick="mostrarMensagem()">
      Enviar
    </button>

    <div class="mensagem" id="mensagem"></div>
  </div>

  <script>
    function mostrarMensagem() {
      const nome = document.getElementById("nome").value;
      const mensagem = document.getElementById("mensagem");

      if (nome.trim() === "") {
        mensagem.style.color = "red";
        mensagem.innerText = "Digite um nome!";
      } else {
        mensagem.style.color = "green";
        mensagem.innerText = `Olá, ${nome}!`;
      }
    }
  </script>

</body>
</html>
